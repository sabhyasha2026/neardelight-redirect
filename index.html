<script>
  (function () {
    var userAgent = navigator.userAgent || navigator.vendor || window.opera;

    var playStoreUrl = "https://play.google.com/store/apps/details?id=com.neardelight.buyer";
    
    // Add App Store link later
    var appStoreUrl = "https://apps.apple.com/in/app/near-delight-real-food-price/id6776620659"; 

    var websiteUrl = "https://neardelight.com/";

    // Android → Play Store
    if (/android/i.test(userAgent)) {
      window.location.replace(playStoreUrl);
      return;
    }

    // iOS → App Store OR fallback to website
    if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
      if (appStoreUrl && appStoreUrl.trim() !== "") {
        window.location.replace(appStoreUrl);
      } else {
        window.location.replace(websiteUrl);
      }
      return;
    }

    // Default → Website
    window.location.replace(websiteUrl);
  })();
</script>
